---
name: Build and Push Container

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ac-infinity-fansync

permissions:
  contents: read

jobs:
  build:
    name: Build Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          {
            echo "version=${VERSION}"
            echo "major=${VERSION%%.*}"
            echo "minor=${VERSION%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (non-release)
        id: meta-dev
        if: github.event_name != 'release'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Extract metadata (release)
        id: meta-release
        if: github.event_name == 'release'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=rolling

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ github.event_name == 'release' && steps.meta-release.outputs.tags || steps.meta-dev.outputs.tags }}
          labels: ${{ github.event_name == 'release' && steps.meta-release.outputs.labels || steps.meta-dev.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}
          STEPS_BUILD_OUTPUTS_DIGEST: ${{ steps.build.outputs.digest }}
          STEPS_META_RELEASE_OUTPUTS_TAGS: ${{ steps.meta-release.outputs.tags }}
          STEPS_META_DEV_OUTPUTS_TAGS: ${{ steps.meta-dev.outputs.tags }}
        run: |
          {
            echo "## Build Complete"
            echo ""
            echo "**Image**: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "**Version**: \`${STEPS_VERSION_OUTPUTS_VERSION}\`"
            echo "**Digest**: \`${STEPS_BUILD_OUTPUTS_DIGEST}\`"
            echo ""
            echo "### Tags"
            echo '```'
            if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
              echo "${STEPS_META_RELEASE_OUTPUTS_TAGS}"
            else
              echo "${STEPS_META_DEV_OUTPUTS_TAGS}"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
